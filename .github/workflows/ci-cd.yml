name: Serverless Data Pipeline CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint & Unit Tests (no Azurite needed)
  # ─────────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # JOB 2: Full Pipeline Simulation with Azurite
  # ─────────────────────────────────────────────
  simulate-pipeline:
    name: Simulate Serverless Pipeline (Azurite)
    runs-on: ubuntu-latest
    needs: test  # Only runs if unit tests pass

    services:
      azurite:
        image: mcr.microsoft.com/azure-storage/azurite
        ports:
          - 10000:10000   # Blob service
          - 10001:10001   # Queue service
          - 10002:10002   # Table service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Azurite to be ready
        run: |
          echo "Waiting for Azurite Blob service on port 10000..."
          for i in $(seq 1 20); do
            if python -c "import socket; s=socket.create_connection(('localhost',10000),2); s.close()" 2>/dev/null; then
              echo "Azurite is up!"
              exit 0
            fi
            echo "Attempt $i/20 - not ready yet, waiting 3s..."
            sleep 3
          done
          echo "ERROR: Azurite did not become ready in time"
          exit 1

      - name: Step 1 — Create Blob Storage container
        run: python create_container.py
        env:
          AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6ImpFQjSjbZ+pM3hq9NAdnhN+Q==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;"

      - name: Step 2 — Upload dataset to Blob Storage
        run: python upload_blob.py
        env:
          AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6ImpFQjSjbZ+pM3hq9NAdnhN+Q==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;"

      - name: Step 3 — Execute serverless function (process nutritional data)
        run: python function.py
        env:
          AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6ImpFQjSjbZ+pM3hq9NAdnhN+Q==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;"

      - name: Verify results.json was produced
        run: |
          echo "── Verifying output artifact ──"
          if [ ! -f simulated_nosql/results.json ]; then
            echo "ERROR: results.json was not created!"
            exit 1
          fi
          echo "results.json found. Contents:"
          cat simulated_nosql/results.json

      - name: Upload results.json as pipeline artifact
        uses: actions/upload-artifact@v4
        with:
          name: nutritional-analysis-results
          path: simulated_nosql/results.json
          retention-days: 30
